---
- name: Upgrade Kubernetes packages and addons
  hosts: kube_cluster
  become: true
  gather_facts: false
  serial: 1
  tasks:
    - name: Unhold Kubernetes packages on Ubuntu
      ansible.builtin.dpkg_selections:
        name: "{{ item }}"
        selection: install
      loop:
        - kubeadm
        - kubelet
        - kubectl
      when: os_family == "ubuntu"

    - name: Install target Kubernetes packages on Ubuntu
      ansible.builtin.apt:
        name:
          - "kubeadm={{ kube_package_version }}"
          - "kubelet={{ kube_package_version }}"
          - "kubectl={{ kube_package_version }}"
        state: present
        update_cache: true
        allow_downgrade: true
      when: os_family == "ubuntu"

    - name: Hold Kubernetes packages again on Ubuntu
      ansible.builtin.dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubeadm
        - kubelet
        - kubectl
      when: os_family == "ubuntu"

    - name: Remove Kubernetes versionlock on Rocky
      ansible.builtin.command: dnf versionlock delete kubeadm kubelet kubectl
      changed_when: false
      failed_when: false
      when: os_family == "rocky"

    - name: Install target Kubernetes packages on Rocky
      ansible.builtin.dnf:
        name:
          - "kubeadm-{{ kube_package_version }}"
          - "kubelet-{{ kube_package_version }}"
          - "kubectl-{{ kube_package_version }}"
        state: present
        disable_excludes: kubernetes
        update_cache: true
      when: os_family == "rocky"

    - name: Hold Kubernetes packages again on Rocky
      ansible.builtin.command: dnf versionlock add kubeadm kubelet kubectl
      changed_when: false
      when: os_family == "rocky"

- name: Upgrade bootstrap control plane
  hosts: bootstrap_control_plane
  become: true
  gather_facts: false
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  tasks:
    - name: Render Cilium values
      ansible.builtin.template:
        src: cilium-values.yaml.j2
        dest: /root/cilium-values.yaml
        mode: "0600"

    - name: Render Cilium LoadBalancer IP pool manifest
      ansible.builtin.template:
        src: cilium-load-balancer-ip-pool.yaml.j2
        dest: /root/cilium-load-balancer-ip-pool.yaml
        mode: "0600"

    - name: Render Cilium L2 announcement policy
      ansible.builtin.template:
        src: cilium-l2-announcement-policy.yaml.j2
        dest: /root/cilium-l2-announcement-policy.yaml
        mode: "0600"

    - name: Render Traefik values
      ansible.builtin.template:
        src: traefik-values.yaml.j2
        dest: /root/traefik-values.yaml
        mode: "0600"

    - name: Detect default network interface for kube-vip
      ansible.builtin.shell: ip -o route show to default | awk '{print $5; exit}'
      args:
        executable: /bin/bash
      register: kube_vip_interface
      changed_when: false
      when: control_plane_count | int > 1

    - name: Render kube-vip static pod manifest on bootstrap control plane
      ansible.builtin.template:
        src: kube-vip.yaml.j2
        dest: /etc/kubernetes/manifests/kube-vip.yaml
        mode: "0644"
      vars:
        kube_vip_interface_name: "{{ kube_vip_interface.stdout | trim }}"
        kube_vip_kubeconfig_host_path: "/etc/kubernetes/admin.conf"
      when: control_plane_count | int > 1

    - name: Upgrade kubeadm
      ansible.builtin.command: "kubeadm upgrade apply -y v{{ kubernetes_version }}"

    - name: Restart kubelet
      ansible.builtin.service:
        name: kubelet
        state: restarted

    - name: Upgrade Cilium
      ansible.builtin.command: >-
        helm upgrade --install cilium cilium/cilium
        --namespace kube-system
        --version {{ cilium_chart_version }}
        --values /root/cilium-values.yaml

    - name: Apply Cilium LoadBalancer IP pool
      ansible.builtin.command: kubectl apply -f /root/cilium-load-balancer-ip-pool.yaml
      changed_when: false

    - name: Apply Cilium L2 announcement policy
      ansible.builtin.command: kubectl apply -f /root/cilium-l2-announcement-policy.yaml
      changed_when: false

    - name: Upgrade Traefik
      ansible.builtin.command: >-
        helm upgrade --install traefik traefik/traefik
        --namespace traefik
        --version {{ traefik_chart_version }}
        --values /root/traefik-values.yaml

    - name: Render Proxmox CSI Helm values
      ansible.builtin.template:
        src: proxmox-csi-values.yaml.j2
        dest: /root/proxmox-csi-values.yaml
        mode: "0600"
      when: install_proxmox_csi | bool

    - name: Upgrade Proxmox CSI from upstream Helm chart
      ansible.builtin.command: >-
        /usr/local/bin/helm upgrade --install proxmox-csi-plugin
        oci://ghcr.io/sergelogvinov/charts/proxmox-csi-plugin
        --namespace csi-proxmox
        --create-namespace
        --version {{ proxmox_csi_chart_version }}
        --values /root/proxmox-csi-values.yaml
      when: install_proxmox_csi | bool

- name: Upgrade remaining nodes
  hosts: "kube_control_plane:!bootstrap_control_plane:kube_workers"
  become: true
  gather_facts: false
  serial: 1
  tasks:
    - name: Detect default network interface for kube-vip
      ansible.builtin.shell: ip -o route show to default | awk '{print $5; exit}'
      args:
        executable: /bin/bash
      register: kube_vip_interface
      changed_when: false
      when:
        - inventory_hostname in groups['kube_control_plane']
        - control_plane_count | int > 1

    - name: Render kube-vip static pod manifest on additional control planes
      ansible.builtin.template:
        src: kube-vip.yaml.j2
        dest: /etc/kubernetes/manifests/kube-vip.yaml
        mode: "0644"
      vars:
        kube_vip_interface_name: "{{ kube_vip_interface.stdout | trim }}"
        kube_vip_kubeconfig_host_path: "/etc/kubernetes/admin.conf"
      when:
        - inventory_hostname in groups['kube_control_plane']
        - control_plane_count | int > 1

    - name: Upgrade node
      ansible.builtin.command: kubeadm upgrade node

    - name: Restart kubelet
      ansible.builtin.service:
        name: kubelet
        state: restarted
