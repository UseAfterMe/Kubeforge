---
- name: Wait for Ubuntu SSH to settle before package work
  ansible.builtin.wait_for_connection:
    timeout: 600
    connect_timeout: 10
    sleep: 5

- name: Wait for Ubuntu cloud-init to finish
  ansible.builtin.shell: |
    if command -v cloud-init >/dev/null 2>&1; then
      timeout 600 cloud-init status --wait
    fi
  args:
    executable: /bin/bash
  register: ubuntu_cloud_init_wait
  changed_when: false
  failed_when: false

- name: Configure apt for reliable IPv4 package fetches
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/99kubeadm-deployer-network
    mode: "0644"
    content: |
      Acquire::ForceIPv4 "true";
      Acquire::Retries "5";
      Acquire::http::Timeout "20";
      Acquire::https::Timeout "20";

- name: Recover any interrupted Ubuntu package state
  ansible.builtin.shell: |
    set -o pipefail
    export DEBIAN_FRONTEND=noninteractive
    export NEEDRESTART_MODE=a
    export APT_LISTCHANGES_FRONTEND=none
    dpkg --configure -a
    apt-get -f install -y
  args:
    executable: /bin/bash
  register: ubuntu_package_recovery
  changed_when: "'Setting up ' in ubuntu_package_recovery.stdout"

- name: Update Ubuntu system packages before Kubernetes prep
  block:
    - name: Run Ubuntu system update
      ansible.builtin.shell: |
        set -o pipefail
        log_file=/var/log/kubeadm-deployer-ubuntu-update.log
        : > "${log_file}"
        export DEBIAN_FRONTEND=noninteractive
        export NEEDRESTART_MODE=a
        export APT_LISTCHANGES_FRONTEND=none
        apt-get update >> "${log_file}" 2>&1
        if ! upgrade_output="$(apt-get \
          -o Dpkg::Options::=--force-confdef \
          -o Dpkg::Options::=--force-confold \
          -y dist-upgrade 2>&1)"; then
          printf '%s\n' "${upgrade_output}" >> "${log_file}"
          exit 1
        fi
        printf '%s\n' "${upgrade_output}" >> "${log_file}"
        upgrade_summary="$(printf '%s\n' "${upgrade_output}" | awk '/^[0-9]+ upgraded, [0-9]+ newly installed, [0-9]+ to remove/ { line = $0 } END { print line }')"
        if printf '%s\n' "${upgrade_summary}" | grep -Eq '^0 upgraded, 0 newly installed, 0 to remove'; then
          echo unchanged
        else
          echo changed
        fi
      args:
        executable: /bin/bash
      register: ubuntu_upgrade_result
      changed_when: "ubuntu_upgrade_result.stdout | trim == 'changed'"
  rescue:
    - name: Read Ubuntu update log tail
      ansible.builtin.shell: tail -n 20 /var/log/kubeadm-deployer-ubuntu-update.log
      args:
        executable: /bin/bash
      register: ubuntu_update_log_tail
      changed_when: false
      failed_when: false

    - name: Repair Ubuntu package state after update failure
      ansible.builtin.shell: |
        set -o pipefail
        export DEBIAN_FRONTEND=noninteractive
        export NEEDRESTART_MODE=a
        export APT_LISTCHANGES_FRONTEND=none
        dpkg --configure -a
        apt-get -f install -y
      args:
        executable: /bin/bash
      register: ubuntu_update_repair
      changed_when: true

    - name: Retry Ubuntu system update after package repair
      ansible.builtin.shell: |
        set -o pipefail
        log_file=/var/log/kubeadm-deployer-ubuntu-update.log
        export DEBIAN_FRONTEND=noninteractive
        export NEEDRESTART_MODE=a
        export APT_LISTCHANGES_FRONTEND=none
        apt-get update >> "${log_file}" 2>&1
        if ! upgrade_output="$(apt-get \
          -o Dpkg::Options::=--force-confdef \
          -o Dpkg::Options::=--force-confold \
          -y dist-upgrade 2>&1)"; then
          printf '%s\n' "${upgrade_output}" >> "${log_file}"
          exit 1
        fi
        printf '%s\n' "${upgrade_output}" >> "${log_file}"
        upgrade_summary="$(printf '%s\n' "${upgrade_output}" | awk '/^[0-9]+ upgraded, [0-9]+ newly installed, [0-9]+ to remove/ { line = $0 } END { print line }')"
        if printf '%s\n' "${upgrade_summary}" | grep -Eq '^0 upgraded, 0 newly installed, 0 to remove'; then
          echo unchanged
        else
          echo changed
        fi
      args:
        executable: /bin/bash
      register: ubuntu_upgrade_result
      changed_when: "ubuntu_upgrade_result.stdout | trim == 'changed'"

- name: Reboot Ubuntu after package updates when needed
  ansible.builtin.reboot:
    reboot_timeout: 1800
    connect_timeout: 10
    post_reboot_delay: 10
    msg: Rebooting after Ubuntu system updates before Kubernetes installation
  when: ubuntu_upgrade_result.changed
