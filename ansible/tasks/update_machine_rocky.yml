---
- name: Wait for Rocky SSH to settle before package work
  ansible.builtin.wait_for_connection:
    timeout: 600
    connect_timeout: 10
    sleep: 5

- name: Wait for Rocky cloud-init to finish
  ansible.builtin.shell: |
    if command -v cloud-init >/dev/null 2>&1; then
      timeout 600 cloud-init status --wait
    fi
  args:
    executable: /bin/bash
  register: rocky_cloud_init_wait
  changed_when: false
  failed_when: false

- name: Configure Rocky resolv.conf from deployer DNS settings
  ansible.builtin.copy:
    dest: /etc/resolv.conf
    mode: "0644"
    content: |
      {% if dns_domain | default('') | trim %}
      search {{ dns_domain }}
      {% endif %}
      {% for server in dns_servers %}
      nameserver {{ server }}
      {% endfor %}
      options timeout:2 attempts:2

- name: Update Rocky system packages before Kubernetes prep
  block:
    - name: Run Rocky system update
      ansible.builtin.shell: |
        set -o pipefail
        log_file=/var/log/kubeadm-deployer-rocky-update.log
        : > "${log_file}"
        timeout 120 dnf -y makecache --refresh --setopt=timeout=20 --setopt=retries=1 >> "${log_file}" 2>&1
        dnf -y upgrade --setopt=timeout=20 --setopt=retries=1 >> "${log_file}" 2>&1
        if grep -q "Nothing to do." "${log_file}"; then
          echo unchanged
        else
          echo changed
        fi
      args:
        executable: /bin/bash
      register: rocky_upgrade_result
      changed_when: "'changed' in rocky_upgrade_result.stdout"
      async: 1800
      poll: 15
  rescue:
    - name: Read Rocky update log tail
      ansible.builtin.shell: tail -n 20 /var/log/kubeadm-deployer-rocky-update.log
      args:
        executable: /bin/bash
      register: rocky_update_log_tail
      changed_when: false
      failed_when: false

    - name: Warn about Rocky update failure and continue
      ansible.builtin.debug:
        msg: >-
          Rocky package update failed after retries and will be skipped for this run.
          Review /var/log/kubeadm-deployer-rocky-update.log on the guest for full details.
          Recent output:
          {{ rocky_update_log_tail.stdout | default('no log output captured') }}

    - name: Mark Rocky update as skipped
      ansible.builtin.set_fact:
        rocky_upgrade_result:
          changed: false

- name: Reboot Rocky after package updates when needed
  ansible.builtin.reboot:
    reboot_timeout: 1800
    connect_timeout: 10
    post_reboot_delay: 10
    msg: Rebooting after Rocky system updates before Kubernetes installation
  when: rocky_upgrade_result.changed
